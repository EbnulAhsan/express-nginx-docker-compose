services:
  nginx:
    image: nginx:alpine
    container_name: express-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  express-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ebnu/express-nginx-app:latest
    container_name: express-app
    environment:
      PORT: 5000
    expose:
      - "5000"
    depends_on:
      - nginx
    restart: unless-stopped
